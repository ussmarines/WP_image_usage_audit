name: QA

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.3']
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict --no-interaction
      - if: matrix.php == '7.4'
        run: composer audit --locked --no-interaction
      - run: composer analyse
      - run: composer test
      - if: matrix.php == '7.4'
        run: composer lint
      - run: php -l image-usage-audit.php
      - run: php -l includes/class-iua-scanner.php
      - run: php -l views/admin-page.php
      - run: php -l uninstall.php
      - run: node --check assets/admin.js
      - run: npm run validate:metadata
      - if: matrix.php == '7.4'
        run: npm run build:zip
  wordpress-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run validate:config
      - run: npm run build:zip
      - run: npx wp-env start
      - run: npx wp-env run cli wp plugin deactivate WP_image_usage_audit
      - run: npx wp-env run cli wp plugin install /var/www/html/wp-content/plugins/WP_image_usage_audit/dist/image-usage-audit.zip --activate
      - run: npx wp-env run cli wp plugin is-active image-usage-audit
      - run: npx wp-env run cli wp eval-file /var/www/html/wp-content/plugins/WP_image_usage_audit/tests/integration/smoke.php
      - run: npx wp-env run cli wp plugin install plugin-check --activate
      - run: npx wp-env run cli wp plugin check image-usage-audit
      - run: npx wp-env run cli wp i18n make-pot /var/www/html/wp-content/plugins/WP_image_usage_audit /var/www/html/wp-content/plugins/WP_image_usage_audit/languages/image-usage-audit.pot --domain=image-usage-audit --exclude=.agents,docs,tests,vendor,node_modules,scripts,dist
      - run: git diff --exit-code -- languages/image-usage-audit.pot
      - if: always()
        run: npx wp-env stop
