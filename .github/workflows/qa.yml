name: QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: composer install --no-interaction --prefer-dist
      - run: composer analyse
      - run: composer test
      - if: matrix.php == '7.4'
        run: composer lint
      - run: php -l image-usage-audit.php
      - run: php -l includes/class-iua-scanner.php
      - run: php -l views/admin-page.php
      - run: php -l uninstall.php
      - run: node --check assets/admin.js
      - run: |
          rg -n 'Version: 2\.2\.5|IUA_VERSION.*2\.2\.5|Stable tag: 2\.2\.5|Project-Id-Version: Image Usage Audit 2\.2\.5' image-usage-audit.php readme.txt languages/image-usage-audit.pot
          rg -n 'Text Domain: image-usage-audit|image-usage-audit' image-usage-audit.php readme.txt languages/image-usage-audit.pot assets/admin.js views/admin-page.php includes/class-iua-scanner.php
  wordpress-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npx wp-env start
      - run: npx wp-env run cli wp plugin is-active image-usage-audit
      - run: npx wp-env run cli wp plugin install plugin-check --activate
      - run: npx wp-env run cli wp plugin check image-usage-audit
      - run: npx wp-env run cli wp i18n make-pot /var/www/html/wp-content/plugins/image-usage-audit /var/www/html/wp-content/plugins/image-usage-audit/languages/image-usage-audit.pot --domain=image-usage-audit --exclude=.agents,docs,tests,vendor,node_modules
      - run: git diff --exit-code -- languages/image-usage-audit.pot
